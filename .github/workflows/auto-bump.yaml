name: Auto bump

on:
  workflow_call:
    inputs:
      tag:
        description: 'Holochain release tag'
        required: true
        type: string
      branch:
        description: 'Branch to update'
        required: true
        type: string
      force:
        description: 'Allow downgrade'
        required: false
        type: boolean
        default: false
    secrets:
      token:
        required: true

concurrency:
  group: auto-bump-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if ! [[ "$INPUT_TAG" =~ ^holochain-[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+\.[0-9]+)?$ ]]; then
            echo "Rejecting tag with unexpected format: $INPUT_TAG" >&2
            exit 1
          fi

      - name: Check out tooling from main
        uses: actions/checkout@v6
        with:
          ref: main
          path: tooling

      - name: Check out target branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.token }}
          path: target

      - name: Install taplo
        env:
          TAPLO_VERSION: '0.10.0'
          TAPLO_SHA256: '8fe196b894ccf9072f98d4e1013a180306e17d244830b03986ee5e8eabeb6156'
        run: |
          curl --fail --silent --show-error --location \
            --output /tmp/taplo.gz \
            "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz"
          echo "${TAPLO_SHA256}  /tmp/taplo.gz" | sha256sum --check --strict
          gunzip --stdout /tmp/taplo.gz > /usr/local/bin/taplo
          chmod +x /usr/local/bin/taplo
          rm /tmp/taplo.gz
          taplo --version

      - name: Resolve versions
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          ARGS=()
          if [ "$INPUT_FORCE" = "true" ]; then
            ARGS+=(--force)
          fi
          "$GITHUB_WORKSPACE/tooling/scripts/resolve-versions.sh" "${ARGS[@]}" "$INPUT_TAG"

      - name: Detect changes
        id: diff
        working-directory: target
        run: |
          if git diff --quiet versions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          path: target
          token: ${{ secrets.token }}
          base: ${{ inputs.branch }}
          branch: auto/bump-${{ inputs.tag }}
          delete-branch: true
          commit-message: "chore: bump to ${{ inputs.tag }}"
          title: "chore: bump to ${{ inputs.tag }}"
          team-reviewers: holochain-devs
          body: |
            Auto-generated by the dispatch listener.

            Triggered by holochain release `${{ inputs.tag }}`. The kitsune2
            and lair tags were resolved from the `Cargo.lock` at that release
            and verified to exist on their upstream repositories.

            The bump tooling is maintained on `main` and was checked out from
            there for this run; only `versions.json` on `${{ inputs.branch }}`
            is changed.
